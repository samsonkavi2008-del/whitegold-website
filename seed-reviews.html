<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seed Test Reviews</title>
<style>
  body{font-family:Inter,system-ui,sans-serif;background:#0f0d04;color:#f0e8d0;display:flex;min-height:100vh;align-items:center;justify-content:center;margin:0}
  .box{background:#181508;border:1px solid rgba(201,168,76,.3);border-radius:8px;padding:32px 36px;max-width:460px}
  h1{font-size:18px;color:#C9A84C;margin:0 0 12px}
  p{font-size:13px;color:#9a8a6a;line-height:1.7}
  code{background:#111;padding:2px 7px;border-radius:4px;color:#E8C96A;font-family:monospace;font-size:12px}
  a{display:inline-block;margin-top:16px;background:#C9A84C;color:#1a1508;text-decoration:none;padding:11px 22px;border-radius:4px;font-weight:600;font-size:12px;letter-spacing:.1em;text-transform:uppercase}
  .ok{color:#5de07a}
  ul{font-size:13px;color:#c0b090;line-height:1.8}
</style>
</head>
<body>
<div class="box">
  <h1>◆ Test Reviews Seeded</h1>
  <p id="status">Writing to localStorage…</p>
  <ul id="list"></ul>
  <p>These are stored under <code>pendingReviews</code> for <code>localhost:5500</code> and will appear on the GoldDesk <b>Customer Reviews</b> page (after you sign in).</p>
  <a href="/golddesk.html">Open GoldDesk →</a>
</div>
<script>
const seed = [
  { name:'Ramesh Iyer', city:'Coimbatore', text:'Walked in skeptical, walked out with cash in 15 minutes. Live rate shown openly.', stars:5, date:new Date().toLocaleDateString('en-IN'), approved:true },
  { name:'Fatima Sheikh', city:'Lucknow', text:'Very transparent purity test. Got a better rate than two other shops nearby.', stars:5, date:new Date().toLocaleDateString('en-IN'), approved:true },
  { name:'Test Pending User', city:'Pune', text:'This one is awaiting approval to show the Pending badge.', stars:4, date:new Date().toLocaleDateString('en-IN'), approved:false },
];
localStorage.setItem('pendingReviews', JSON.stringify(seed));
document.getElementById('status').innerHTML = '<span class="ok">✓ Seeded ' + seed.length + ' reviews.</span>';
document.getElementById('list').innerHTML = seed.map(r =>
  '<li>' + '★'.repeat(r.stars) + ' — ' + r.name + ' (' + r.city + ') · ' + (r.approved ? 'Published' : 'Pending') + '</li>'
).join('');
</script>
</body>
</html>
